<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 3rem;
      letter-spacing: 0.1em;
      color: #a0a0c0;
    }

    .games-grid {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .game-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .game-icon {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      background: #1a2a1a;
      border: 2px solid #2a4a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    .game-card:hover .game-icon {
      transform: scale(1.08);
      border-color: #4caf50;
      box-shadow: 0 0 24px rgba(76, 175, 80, 0.4);
    }

    .game-label {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #c0c0d0;
    }
  </style>
</head>
<body>
  <h1>My Games</h1>
  <div class="games-grid">
    <a class="game-card" href="snake-game/snake.html">
      <div class="game-icon">🐍</div>
      <span class="game-label">Snake</span>
    </a>
  </div>
</body>
</html>
