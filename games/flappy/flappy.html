<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLAPVOID — Flappy Bird</title>
<script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root, [data-theme="dark"] { --game-bg: #0a0a0f; }
  [data-theme="light"]        { --game-bg: #1a1a2e; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--game-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Orbitron', sans-serif;
    overflow: hidden;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
  }
  .theme-toggle {
    position: fixed; top: 16px; right: 16px; z-index: 9999;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px; padding: 6px 13px;
    color: rgba(255,255,255,0.6); cursor: pointer; font-size: 14px;
    transition: background 0.2s, color 0.2s;
    display: flex; align-items: center; gap: 6px;
    font-family: 'Orbitron', sans-serif;
    backdrop-filter: blur(8px);
  }
  .theme-toggle:hover { background: rgba(255,255,255,0.14); color: #fff; }
</style>
</head>
<body>
<button class="theme-toggle" id="theme-toggle"><span id="toggle-icon">🌙</span></button>
<canvas id="c"></canvas>
<script>
// ── Theme ──
(function(){
  var btn=document.getElementById('theme-toggle'),icon=document.getElementById('toggle-icon');
  function applyTheme(t){document.documentElement.setAttribute('data-theme',t);icon.textContent=t==='dark'?'🌙':'☀️';localStorage.setItem('theme',t);}
  applyTheme(localStorage.getItem('theme')||'dark');
  btn.addEventListener('click',function(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');});
})();
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = 480, H = 640;
canvas.width = W;
canvas.height = H;

// ── Constants ──
const GRAVITY      = 0.45;
const FLAP_POWER   = -8.5;
const PIPE_W       = 68;
const PIPE_GAP     = 160;
const PIPE_SPEED   = 2.8;
const PIPE_INTERVAL= 90; // frames between pipes
const GROUND_H     = 70;
const BIRD_X       = 100;

// ── Palette ──
const C = {
  bg1:      '#0a0a1a',
  bg2:      '#0d0d2b',
  star:     '#ffffff',
  ground:   '#1a1a2e',
  groundTop:'#ff3c00',
  pipe:     '#00b4a0',
  pipeGlow: 'rgba(0,180,160,0.18)',
  pipeEdge: '#00e5cc',
  bird:     '#ffe600',
  birdWing: '#ff9900',
  birdEye:  '#0a0a1a',
  birdGlow: 'rgba(255,230,0,0.35)',
  accent:   '#ff3c00',
  text:     '#f5f0e8',
  textDim:  'rgba(245,240,232,0.4)',
  score:    '#ffe600',
  ui:       'rgba(10,10,26,0.75)',
};

// ── State ──
let state    = 'idle'; // idle | playing | dead
let bird, pipes, stars, particles;
let score, best, frame, scrollX;
let flashTimer = 0;
let deathShake = 0;

// ── Stars ──
function makeStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * (H - GROUND_H),
      r: Math.random() * 1.4 + 0.2,
      a: Math.random(),
      speed: Math.random() * 0.3 + 0.05,
    });
  }
}

// ── Init ──
function init() {
  bird = { x: BIRD_X, y: H / 2 - 40, vy: 0, angle: 0, wingPhase: 0 };
  pipes = [];
  particles = [];
  score = 0;
  frame = 0;
  scrollX = 0;
}

function reset() {
  init();
  state = 'idle';
}

// ── Pipe ──
function spawnPipe() {
  const minY = 80, maxY = H - GROUND_H - PIPE_GAP - 80;
  const topH = Math.floor(Math.random() * (maxY - minY) + minY);
  pipes.push({ x: W + 10, topH, scored: false });
}

// ── Particles ──
function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 1,
      decay: Math.random() * 0.04 + 0.025,
      r: Math.random() * 4 + 2,
      color,
    });
  }
}

// ── Collision ──
const BIRD_R = 13;
function checkCollision() {
  // Ground / ceiling
  if (bird.y - BIRD_R < 0 || bird.y + BIRD_R > H - GROUND_H) return true;
  for (const p of pipes) {
    const bx = bird.x, by = bird.y;
    const px = p.x, pw = PIPE_W;
    if (bx + BIRD_R > px && bx - BIRD_R < px + pw) {
      if (by - BIRD_R < p.topH || by + BIRD_R > p.topH + PIPE_GAP) return true;
    }
  }
  return false;
}

// ── Flap ──
function flap() {
  if (state === 'idle') { state = 'playing'; }
  if (state === 'dead') { reset(); state = 'playing'; return; }
  bird.vy = FLAP_POWER;
  spawnParticles(bird.x - 10, bird.y + 10, C.birdWing, 6);
}

// ── Update ──
function update() {
  if (state !== 'playing') return;
  frame++;
  scrollX += PIPE_SPEED;

  // Bird physics
  bird.vy += GRAVITY;
  bird.vy = Math.max(bird.vy, -12);
  bird.y += bird.vy;
  bird.angle = Math.min(Math.max(bird.vy * 3.5, -30), 90);
  bird.wingPhase += 0.25;

  // Pipes
  if (frame % PIPE_INTERVAL === 0) spawnPipe();
  for (const p of pipes) {
    p.x -= PIPE_SPEED;
    if (!p.scored && p.x + PIPE_W < bird.x) {
      p.scored = true;
      score++;
      spawnParticles(bird.x, bird.y, C.score, 12);
      flashTimer = 8;
      if (!best || score > best) best = score;
    }
  }
  pipes = pipes.filter(p => p.x + PIPE_W > -10);

  // Particles
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15;
    p.life -= p.decay;
  }
  particles = particles.filter(p => p.life > 0);

  // Stars parallax
  for (const s of stars) {
    s.x -= s.speed;
    if (s.x < 0) s.x = W;
    s.a = 0.4 + Math.sin(Date.now() * 0.001 * s.speed * 3) * 0.3;
  }

  if (flashTimer > 0) flashTimer--;
  if (deathShake > 0) deathShake--;

  // Collision
  if (checkCollision()) {
    state = 'dead';
    deathShake = 18;
    spawnParticles(bird.x, bird.y, C.bird, 20);
    spawnParticles(bird.x, bird.y, C.accent, 14);
  }
}

// ── Draw helpers ──
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ── Draw ──
function draw() {
  const shakeX = deathShake > 0 ? (Math.random() - 0.5) * deathShake * 0.8 : 0;
  const shakeY = deathShake > 0 ? (Math.random() - 0.5) * deathShake * 0.8 : 0;
  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#050510');
  bg.addColorStop(1, '#0d1a2e');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (const s of stars) {
    ctx.globalAlpha = s.a;
    ctx.fillStyle = C.star;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Nebula blobs
  drawNebula();

  // Score flash overlay
  if (flashTimer > 0) {
    ctx.globalAlpha = (flashTimer / 8) * 0.12;
    ctx.fillStyle = C.score;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  // Pipes
  for (const p of pipes) drawPipe(p);

  // Ground
  drawGround();

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Bird
  if (state !== 'dead') drawBird();

  // HUD
  drawHUD();

  ctx.restore();
}

function drawNebula() {
  const t = Date.now() * 0.0003;
  const blobs = [
    { x: W * 0.2, y: H * 0.25, r: 140, color: 'rgba(124,58,237,0.07)' },
    { x: W * 0.75, y: H * 0.6,  r: 160, color: 'rgba(0,180,160,0.06)' },
    { x: W * 0.5,  y: H * 0.4,  r: 120, color: 'rgba(255,60,0,0.04)'  },
  ];
  for (const b of blobs) {
    const grad = ctx.createRadialGradient(
      b.x + Math.sin(t) * 20, b.y + Math.cos(t * 0.7) * 15, 0,
      b.x, b.y, b.r
    );
    grad.addColorStop(0, b.color);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPipe(p) {
  const x = p.x, tw = PIPE_W, gap = PIPE_GAP;
  const topH = p.topH;
  const botY = topH + gap;
  const botH = H - GROUND_H - botY;

  for (const [py, ph, flip] of [[0, topH, false], [botY, botH, true]]) {
    if (ph <= 0) continue;

    // Glow
    ctx.shadowColor = C.pipeGlow;
    ctx.shadowBlur = 18;

    // Body gradient
    const grad = ctx.createLinearGradient(x, 0, x + tw, 0);
    grad.addColorStop(0,   'rgba(0,140,120,0.9)');
    grad.addColorStop(0.35, C.pipe);
    grad.addColorStop(0.65, C.pipeEdge);
    grad.addColorStop(1,   'rgba(0,100,90,0.8)');
    ctx.fillStyle = grad;
    roundRect(x + 2, py, tw - 4, ph, 4);
    ctx.fill();

    // Edge cap
    const capH = 22, capX = x - 4, capW = tw + 8;
    const capY = flip ? py : py + ph - capH;
    const capGrad = ctx.createLinearGradient(capX, 0, capX + capW, 0);
    capGrad.addColorStop(0,   '#007a6e');
    capGrad.addColorStop(0.4,  C.pipe);
    capGrad.addColorStop(0.65, C.pipeEdge);
    capGrad.addColorStop(1,   '#005f56');
    ctx.fillStyle = capGrad;
    roundRect(capX, capY, capW, capH, 5);
    ctx.fill();

    // Highlight stripe
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(0,229,204,0.25)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x + 10, py + 2);
    ctx.lineTo(x + 10, py + ph - 2);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
}

function drawGround() {
  // Ground block
  ctx.fillStyle = '#0f1020';
  ctx.fillRect(0, H - GROUND_H, W, GROUND_H);

  // Top line (accent)
  ctx.fillStyle = C.groundTop;
  ctx.fillRect(0, H - GROUND_H, W, 3);

  // Scrolling grid pattern
  ctx.strokeStyle = 'rgba(255,60,0,0.12)';
  ctx.lineWidth = 1;
  const step = 40;
  const off = scrollX % step;
  for (let x = -off; x < W + step; x += step) {
    ctx.beginPath();
    ctx.moveTo(x, H - GROUND_H + 3);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  for (let y = H - GROUND_H + 3; y < H; y += 20) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
}

function drawBird() {
  const { x, y, angle, wingPhase } = bird;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate((angle * Math.PI) / 180);

  // Glow
  ctx.shadowColor = C.birdGlow;
  ctx.shadowBlur = 22;

  // Body
  ctx.fillStyle = C.bird;
  ctx.beginPath();
  ctx.ellipse(0, 0, 17, 13, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wing
  const wingY = Math.sin(wingPhase) * 5;
  ctx.fillStyle = C.birdWing;
  ctx.beginPath();
  ctx.ellipse(-4, 4 + wingY, 10, 6, -0.4, 0, Math.PI * 2);
  ctx.fill();

  // Eye
  ctx.shadowBlur = 0;
  ctx.fillStyle = C.birdEye;
  ctx.beginPath();
  ctx.arc(7, -3, 4.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(8, -4, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#ff9900';
  ctx.beginPath();
  ctx.moveTo(14, -1);
  ctx.lineTo(20, 1);
  ctx.lineTo(14, 4);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawHUD() {
  if (state === 'playing' || state === 'dead') {
    // Score
    ctx.shadowColor = C.score;
    ctx.shadowBlur = 16;
    ctx.fillStyle = C.score;
    ctx.font = '900 52px Orbitron';
    ctx.textAlign = 'center';
    ctx.fillText(score, W / 2, 80);
    ctx.shadowBlur = 0;

    if (best > 0) {
      ctx.fillStyle = C.textDim;
      ctx.font = '400 11px Orbitron';
      ctx.fillText('BEST  ' + best, W / 2, 102);
    }
  }

  if (state === 'idle') drawIdle();
  if (state === 'dead') drawDead();
}

function drawIdle() {
  // Panel
  ctx.fillStyle = C.ui;
  roundRect(W/2 - 160, H/2 - 120, 320, 200, 16);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,230,0,0.2)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.shadowColor = C.score;
  ctx.shadowBlur = 20;
  ctx.fillStyle = C.score;
  ctx.font = '900 38px Orbitron';
  ctx.textAlign = 'center';
  ctx.fillText('FLAPVOID', W / 2, H / 2 - 56);
  ctx.shadowBlur = 0;

  ctx.fillStyle = C.textDim;
  ctx.font = '400 11px Orbitron';
  ctx.fillText('A DEEP-SPACE SURVIVAL CHALLENGE', W / 2, H / 2 - 26);

  // Pulse tap prompt
  const pulse = 0.6 + Math.sin(Date.now() * 0.005) * 0.4;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = C.text;
  ctx.font = '700 14px Orbitron';
  ctx.fillText('TAP / SPACE TO LAUNCH', W / 2, H / 2 + 36);
  ctx.globalAlpha = 1;

  // Bird preview bounce
  const bY = H / 2 - 5 + Math.sin(Date.now() * 0.004) * 8;
  bird.y = bY;
  bird.angle = Math.sin(Date.now() * 0.004) * 8;
  bird.wingPhase += 0.12;
  drawBird();
}

function drawDead() {
  // Dim overlay
  ctx.fillStyle = 'rgba(5,5,16,0.6)';
  ctx.fillRect(0, 0, W, H);

  // Panel
  ctx.fillStyle = C.ui;
  roundRect(W/2 - 160, H/2 - 130, 320, 240, 16);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,60,0,0.3)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.shadowColor = C.accent;
  ctx.shadowBlur = 18;
  ctx.fillStyle = C.accent;
  ctx.font = '900 40px Orbitron';
  ctx.textAlign = 'center';
  ctx.fillText('VOID OUT', W / 2, H / 2 - 68);
  ctx.shadowBlur = 0;

  // Score display
  ctx.fillStyle = C.textDim;
  ctx.font = '400 10px Orbitron';
  ctx.fillText('SCORE', W / 2 - 60, H / 2 - 22);
  ctx.fillText('BEST', W / 2 + 60, H / 2 - 22);

  ctx.fillStyle = C.score;
  ctx.shadowColor = C.score;
  ctx.shadowBlur = 10;
  ctx.font = '700 34px Orbitron';
  ctx.fillText(score, W / 2 - 60, H / 2 + 18);
  ctx.fillStyle = best === score ? C.score : C.text;
  ctx.fillText(best, W / 2 + 60, H / 2 + 18);
  ctx.shadowBlur = 0;

  if (best === score && score > 0) {
    ctx.fillStyle = C.score;
    ctx.font = '700 10px Orbitron';
    ctx.fillText('✦ NEW BEST ✦', W / 2 + 60, H / 2 + 36);
  }

  // Tap to retry
  const pulse = 0.6 + Math.sin(Date.now() * 0.006) * 0.4;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = C.text;
  ctx.font = '700 13px Orbitron';
  ctx.fillText('TAP / SPACE TO RETRY', W / 2, H / 2 + 80);
  ctx.globalAlpha = 1;
}

// ── Input ──
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
});
document.addEventListener('pointerdown', () => flap());

// ── Loop ──
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ── Boot ──
best = parseInt(localStorage.getItem('flapvoid_best') || '0');
makeStars();
init();
loop();

// Save best
setInterval(() => {
  if (best) localStorage.setItem('flapvoid_best', best);
}, 2000);
</script>
</body>
</html>
