<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MISTRAL ARENA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black:   #0a0a0a;
    --surface: #111118;
    --card:    #14141e;
    --border:  rgba(245,240,232,0.07);
    --white:   #f5f0e8;
    --dim:     rgba(245,240,232,0.35);
    --accent:  #ffe600;
    --grid:    rgba(245,240,232,0.03);

    /* Model colours */
    --c-mistral-small:  #ff3c00;
    --c-mistral-medium: #7c3aed;
    --c-mistral-large:  #00b4a0;
    --c-openai:         #10a37f;
    --c-anthropic:      #d97706;
    --c-google:         #4285f4;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none; z-index: 0;
  }

  /* ── NAV ── */
  nav {
    position: sticky; top: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 5vw;
    background: rgba(10,10,10,0.88);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    z-index: 100;
  }
  .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.1em; }
  .nav-logo span { color: var(--accent); }
  .nav-tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px; letter-spacing: 0.22em;
    color: var(--dim); text-transform: uppercase;
  }

  /* ── MAIN ── */
  main { position: relative; z-index: 1; max-width: 1600px; margin: 0 auto; padding: 44px 5vw 80px; }

  /* ── HEADER ── */
  .page-header { margin-bottom: 44px; }
  .page-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px; letter-spacing: 0.3em;
    color: var(--accent); text-transform: uppercase; margin-bottom: 12px;
  }
  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 7vw, 90px);
    line-height: 0.92; letter-spacing: -0.01em; margin-bottom: 14px;
  }
  .page-title em { font-style: normal; color: var(--accent); }
  .page-desc { font-size: 14px; line-height: 1.7; color: var(--dim); max-width: 500px; }

  /* ── CONFIG PANEL ── */
  .config-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 32px 22px;
    margin-bottom: 32px;
  }
  .config-row { display: flex; gap: 14px; align-items: flex-end; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; gap: 7px; flex: 1; min-width: 200px; }
  .field-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px; letter-spacing: 0.22em;
    color: var(--dim); text-transform: uppercase;
  }
  .field textarea {
    background: rgba(245,240,232,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none; width: 100%;
    min-height: 72px; resize: vertical; line-height: 1.6;
  }
  .field textarea:focus {
    border-color: rgba(255,230,0,0.4);
    box-shadow: 0 0 0 3px rgba(255,230,0,0.07);
  }
  .field textarea::placeholder { color: rgba(245,240,232,0.2); }

  .submit-btn {
    background: var(--accent); color: #0a0a0a;
    border: none; border-radius: 8px;
    padding: 13px 34px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 0.1em;
    cursor: pointer; white-space: nowrap;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    flex-shrink: 0;
  }
  .submit-btn:hover:not(:disabled) {
    opacity: 0.9; transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(255,230,0,0.25);
  }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .status-bar {
    font-family: 'Space Mono', monospace;
    font-size: 10px; letter-spacing: 0.12em;
    color: var(--dim); margin-top: 12px; min-height: 16px;
    transition: color 0.2s;
  }
  .status-bar.error { color: #ff3c00; }
  .status-bar.ok    { color: #00b4a0; }

  /* ── MODEL SELECTOR ── */
  .selector-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px; letter-spacing: 0.25em;
    text-transform: uppercase; color: var(--dim);
    margin-bottom: 12px;
  }
  .model-pills {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 28px;
  }
  .pill {
    display: flex; align-items: center; gap: 7px;
    padding: 6px 14px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: rgba(245,240,232,0.03);
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em;
    color: rgba(245,240,232,0.4);
    transition: all 0.2s;
    user-select: none;
  }
  .pill .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor; opacity: 0.4;
    transition: opacity 0.2s;
  }
  .pill.active {
    border-color: var(--pill-color);
    color: var(--pill-color);
    background: color-mix(in srgb, var(--pill-color) 10%, transparent);
  }
  .pill.active .dot { opacity: 1; }
  .pill:hover:not(.active) { border-color: rgba(245,240,232,0.2); color: rgba(245,240,232,0.6); }

  /* ── ARENA ── */
  .arena {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
  }
  @media (max-width: 1100px) { .arena { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 680px)  { .arena { grid-template-columns: 1fr; } }

  /* ── MODEL CARD ── */
  .model-card {
    background: var(--card);
    border: 1px solid var(--border);
    overflow: hidden;
    display: flex; flex-direction: column;
    min-height: 280px;
    transition: border-color 0.3s, opacity 0.25s;
    position: relative;
  }
  .model-card:first-child  { border-radius: 12px 0 0 12px; }
  .model-card:last-child   { border-radius: 0 12px 12px 0; }
  .model-card:only-child   { border-radius: 12px; }
  @media (max-width: 1100px) {
    .model-card:nth-child(odd):last-child { border-radius: 0 0 12px 12px; }
  }

  .model-card.loading { border-color: color-mix(in srgb, var(--c) 22%, transparent); }
  .model-card.done    { border-color: color-mix(in srgb, var(--c) 28%, transparent); }
  .model-card.errored { border-color: rgba(255,60,0,0.25); }

  /* Shimmer bar */
  .model-card::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg,
      transparent 0%, var(--c) 40%,
      color-mix(in srgb, var(--c) 60%, white) 50%,
      var(--c) 60%, transparent 100%);
    background-size: 200% 100%;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .model-card.loading::after {
    opacity: 1;
    animation: shimmer 1.4s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%   { background-position: 200% center; }
    100% { background-position: -200% center; }
  }

  /* ── CARD HEAD ── */
  .card-head {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-head-left { display: flex; flex-direction: column; gap: 3px; }
  .model-badge {
    font-family: 'Space Mono', monospace;
    font-size: 8px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--c);
    padding: 3px 8px; border-radius: 4px;
    background: color-mix(in srgb, var(--c) 12%, transparent);
    border: 1px solid color-mix(in srgb, var(--c) 22%, transparent);
    display: inline-block; width: fit-content;
  }
  .model-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 0.04em; color: var(--white);
  }
  .card-status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--border); flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .model-card.loading .card-status-dot {
    background: var(--accent);
    box-shadow: 0 0 7px var(--accent);
    animation: pulse-dot 0.8s ease-in-out infinite alternate;
  }
  .model-card.done .card-status-dot {
    background: var(--c);
    box-shadow: 0 0 7px var(--c);
  }
  .model-card.errored .card-status-dot { background: #ff3c00; }
  @keyframes pulse-dot { from { opacity: 1; } to { opacity: 0.25; } }

  /* ── Winner badges ── */
  .winner-badge {
    font-family: 'Space Mono', monospace;
    font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 4px; font-weight: 700;
    white-space: nowrap;
    transform: scale(0.6) translateY(-6px);
    opacity: 0;
    animation: badge-drop 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes badge-drop {
    to { transform: scale(1) translateY(0); opacity: 1; }
  }
  .badge-fastest {
    background: rgba(255,230,0,0.15);
    color: #ffe600;
    border: 1px solid rgba(255,230,0,0.35);
  }
  .badge-efficient {
    background: rgba(0,180,100,0.15);
    color: #00c875;
    border: 1px solid rgba(0,200,117,0.35);
  }
  .badge-detailed {
    background: rgba(124,58,237,0.15);
    color: #a78bfa;
    border: 1px solid rgba(124,58,237,0.35);
  }
  /* Glowing border overrides */
  .model-card.winner-fastest  { box-shadow: 0 0 0 1px rgba(255,230,0,0.5),  0 0 24px rgba(255,230,0,0.08); }
  .model-card.winner-efficient{ box-shadow: 0 0 0 1px rgba(0,200,117,0.5),  0 0 24px rgba(0,200,117,0.08); }
  .model-card.winner-detailed { box-shadow: 0 0 0 1px rgba(124,58,237,0.5), 0 0 24px rgba(124,58,237,0.08); }
  /* A card can win multiple — stack shadows */
  .model-card.winner-fastest.winner-detailed {
    box-shadow:
      0 0 0 1px rgba(255,230,0,0.4),
      0 0 0 1px rgba(124,58,237,0.4),
      0 0 24px rgba(255,230,0,0.07),
      0 0 24px rgba(124,58,237,0.07);
  }

  /* ── META ROW ── */
  .card-meta {
    display: flex; gap: 16px;
    padding: 10px 22px;
    border-bottom: 1px solid var(--border);
    background: rgba(245,240,232,0.02);
    flex-wrap: wrap;
  }
  .meta-item { display: flex; flex-direction: column; gap: 2px; }
  .meta-label {
    font-family: 'Space Mono', monospace;
    font-size: 7px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--dim);
  }
  .meta-value {
    font-family: 'Space Mono', monospace;
    font-size: 12px; font-weight: 700; color: var(--c);
  }
  .meta-value.empty { color: rgba(245,240,232,0.12); }

  /* ── CARD BODY ── */
  .card-body {
    flex: 1; padding: 20px 22px;
    font-size: 13px; line-height: 1.75;
    color: rgba(245,240,232,0.78);
    overflow-y: auto;
    white-space: pre-wrap; word-break: break-word;
  }
  .card-body.placeholder {
    display: flex; align-items: center; justify-content: center;
    color: rgba(245,240,232,0.1);
    font-family: 'Space Mono', monospace;
    font-size: 10px; letter-spacing: 0.15em;
    text-transform: uppercase; text-align: center;
  }

  /* Thinking dots */
  .thinking-dots {
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; height: 100%;
  }
  .thinking-dots-row { display: flex; gap: 8px; align-items: center; }
  .thinking-dots-row span {
    display: block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--c); opacity: 0.15;
    animation: dot-bounce 1.2s ease-in-out infinite;
  }
  .thinking-dots-row span:nth-child(1) { animation-delay: 0s; }
  .thinking-dots-row span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots-row span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot-bounce {
    0%, 80%, 100% { opacity: 0.12; transform: scale(1); }
    40%           { opacity: 1;    transform: scale(1.4); }
  }
  .thinking-dots-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--c); opacity: 0.5;
  }

  /* Scrollbar */
  .card-body::-webkit-scrollbar { width: 3px; }
  .card-body::-webkit-scrollbar-track { background: transparent; }
  .card-body::-webkit-scrollbar-thumb { background: rgba(245,240,232,0.08); border-radius: 2px; }

  /* ── SECTION DIVIDER ── */
  .section-divider {
    display: flex; align-items: center; gap: 18px;
    margin: 40px 0 28px;
  }
  .section-divider-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px; letter-spacing: 0.28em;
    text-transform: uppercase; color: var(--dim); white-space: nowrap;
  }
  .section-divider-line { flex: 1; height: 1px; background: var(--border); }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">BINZOKI<span>.</span>STUDIO</div>
  <div class="nav-tag">Model Arena · 6 Providers</div>
</nav>

<main>
  <div class="page-header">
    <div class="page-label">// Tool — 001</div>
    <h1 class="page-title">MODEL<br><em>ARENA</em></h1>
    <p class="page-desc">Fire one prompt at six models across four providers simultaneously. Compare speed, quality and token cost side by side.</p>
  </div>

  <!-- Config -->
  <div class="config-panel">
    <!-- Model selector -->
    <div class="selector-label">Select Models</div>
    <div class="model-pills" id="pill-row"></div>

    <!-- Prompt + fire -->
    <div class="config-row">
      <div class="field">
        <label class="field-label" for="prompt">Prompt <span style="color:rgba(245,240,232,0.2);">— Enter to fire · Shift+Enter for newline</span></label>
        <textarea id="prompt" placeholder="Enter your prompt…" spellcheck="false"></textarea>
      </div>
      <button class="submit-btn" id="submit-btn">FIRE</button>
    </div>
    <div class="status-bar" id="status-bar"></div>
  </div>

  <!-- Arena -->
  <div class="section-divider">
    <div class="section-divider-label">// Responses</div>
    <div class="section-divider-line"></div>
  </div>
  <div class="arena" id="arena"></div>
</main>

<script>
// ── Model definitions ─────────────────────────────────────────────────────────
const MODELS = [
  { key: 'mistral-small',  provider: 'mistral',   id: 'mistral-small-latest',  label: 'Mistral Small',  badge: 'Mistral',   color: '#ff3c00' },
  { key: 'mistral-medium', provider: 'mistral',   id: 'mistral-medium-latest', label: 'Mistral Medium', badge: 'Mistral',   color: '#7c3aed' },
  { key: 'mistral-large',  provider: 'mistral',   id: 'mistral-large-latest',  label: 'Mistral Large',  badge: 'Mistral',   color: '#00b4a0' },
  { key: 'gpt-4o-mini',    provider: 'openai',    id: 'gpt-4o-mini',           label: 'GPT-4o Mini',    badge: 'OpenAI',    color: '#10a37f' },
  { key: 'claude-haiku',   provider: 'anthropic', id: 'claude-haiku-4-5',      label: 'Claude Haiku',   badge: 'Anthropic', color: '#d97706' },
  { key: 'gemini-flash',   provider: 'google',    id: 'gemini-2.0-flash',      label: 'Gemini Flash',   badge: 'Google',    color: '#4285f4' },
];

// All active by default
const active = new Set(MODELS.map(m => m.key));

// ── Build pill row ────────────────────────────────────────────────────────────
const pillRow = document.getElementById('pill-row');
for (const m of MODELS) {
  const pill = document.createElement('button');
  pill.className = 'pill active';
  pill.dataset.key = m.key;
  pill.style.setProperty('--pill-color', m.color);
  pill.innerHTML = `<span class="dot"></span>${m.label}`;
  pill.addEventListener('click', () => togglePill(m.key, pill));
  pillRow.appendChild(pill);
}

function togglePill(key, pill) {
  if (active.has(key)) {
    if (active.size === 1) return; // keep at least one
    active.delete(key);
    pill.classList.remove('active');
  } else {
    active.add(key);
    pill.classList.add('active');
  }
  renderCards();
}

// ── Build arena cards ─────────────────────────────────────────────────────────
const arena = document.getElementById('arena');

function renderCards() {
  arena.innerHTML = '';
  const selected = MODELS.filter(m => active.has(m.key));
  for (const m of selected) {
    const card = document.createElement('div');
    card.className = 'model-card';
    card.id = `card-${m.key}`;
    card.style.setProperty('--c', m.color);
    card.innerHTML = `
      <div class="card-head">
        <div class="card-head-left">
          <span class="model-badge">${m.badge}</span>
          <span class="model-name">${m.label}</span>
        </div>
        <div class="card-status-dot"></div>
      </div>
      <div class="card-meta">
        <div class="meta-item">
          <span class="meta-label">Time</span>
          <span class="meta-value empty" id="${m.key}-time">—</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Tokens in</span>
          <span class="meta-value empty" id="${m.key}-tok-in">—</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Tokens out</span>
          <span class="meta-value empty" id="${m.key}-tok-out">—</span>
        </div>
      </div>
      <div class="card-body placeholder" id="${m.key}-body">AWAITING PROMPT</div>`;
    arena.appendChild(card);
  }

  // Fix border-radius for first/last in current layout
  const cards = arena.querySelectorAll('.model-card');
  cards.forEach((c, i) => {
    c.style.borderRadius = '';
  });
  if (cards.length === 1) {
    cards[0].style.borderRadius = '12px';
  } else {
    cards[0].style.borderRadius = '12px 0 0 12px';
    cards[cards.length - 1].style.borderRadius = '0 12px 12px 0';
  }
}

renderCards();

// ── DOM helpers ───────────────────────────────────────────────────────────────
const promptInput = document.getElementById('prompt');
const submitBtn   = document.getElementById('submit-btn');
const statusBar   = document.getElementById('status-bar');

function setStatus(msg, type = '') {
  statusBar.textContent = msg;
  statusBar.className = 'status-bar' + (type ? ' ' + type : '');
}
function card(key)   { return document.getElementById(`card-${key}`); }
function body(key)   { return document.getElementById(`${key}-body`); }
function timeEl(key) { return document.getElementById(`${key}-time`); }
function tokIn(key)  { return document.getElementById(`${key}-tok-in`); }
function tokOut(key) { return document.getElementById(`${key}-tok-out`); }

function setLoading(key) {
  const c = card(key); if (!c) return;
  c.className = 'model-card loading';
  c.style.setProperty('--c', MODELS.find(m => m.key === key).color);
  const b = body(key);
  b.className = 'card-body';
  b.innerHTML = `<div class="thinking-dots">
    <div class="thinking-dots-row"><span></span><span></span><span></span></div>
    <div class="thinking-dots-label">Thinking…</div>
  </div>`;
}

function setDone(key, text, ms, tIn, tOut) {
  const c = card(key); if (!c) return;
  c.classList.remove('loading'); c.classList.add('done');
  body(key).className = 'card-body';
  body(key).textContent = text;
  timeEl(key).textContent = ms.toLocaleString() + ' ms'; timeEl(key).className = 'meta-value';
  tokIn(key).textContent  = tIn.toLocaleString();         tokIn(key).className  = 'meta-value';
  tokOut(key).textContent = tOut.toLocaleString();        tokOut(key).className = 'meta-value';
  results[key] = { ms, tokOut: tOut }; // store for winner calc
}

function setError(key, msg) {
  const c = card(key); if (!c) return;
  c.classList.remove('loading'); c.classList.add('errored');
  body(key).className = 'card-body';
  body(key).textContent = '⚠  ' + msg;
}

// ── Results store ─────────────────────────────────────────────────────────────
const results = {}; // key → { ms, tokOut }

// ── Award winners ─────────────────────────────────────────────────────────────
function awardWinners() {
  const eligible = Object.entries(results); // only keys that succeeded
  if (eligible.length === 0) return;

  // Fastest — lowest ms
  const fastest = eligible.reduce((a, b) => a[1].ms < b[1].ms ? a : b)[0];
  // Most efficient — lowest tokOut
  const efficient = eligible.reduce((a, b) => a[1].tokOut < b[1].tokOut ? a : b)[0];
  // Most detailed — highest tokOut
  const detailed = eligible.reduce((a, b) => a[1].tokOut > b[1].tokOut ? a : b)[0];

  const awards = [
    { key: fastest,   cls: 'winner-fastest',   badgeCls: 'badge-fastest',   label: '⚡ FASTEST'   },
    { key: efficient, cls: 'winner-efficient',  badgeCls: 'badge-efficient', label: '◆ EFFICIENT'  },
    { key: detailed,  cls: 'winner-detailed',   badgeCls: 'badge-detailed',  label: '★ DETAILED'   },
  ];

  // Group badges per card so we can replace the dot with potentially multiple badges
  const perCard = {};
  for (const a of awards) {
    if (!perCard[a.key]) perCard[a.key] = [];
    perCard[a.key].push(a);
  }

  for (const [key, wins] of Object.entries(perCard)) {
    const c = card(key); if (!c) continue;
    wins.forEach(w => c.classList.add(w.cls));

    // Replace the status dot with badge(s)
    const dot = c.querySelector('.card-status-dot');
    if (!dot) continue;
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'display:flex;flex-direction:column;align-items:flex-end;gap:4px;';
    wins.forEach((w, i) => {
      const badge = document.createElement('span');
      badge.className = `winner-badge ${w.badgeCls}`;
      badge.style.animationDelay = `${i * 80}ms`;
      badge.textContent = w.label;
      wrapper.appendChild(badge);
    });
    dot.replaceWith(wrapper);
  }
}

// ── Fire ──────────────────────────────────────────────────────────────────────
async function fire() {
  const prompt = promptInput.value.trim();
  if (!prompt) { setStatus('Enter a prompt.', 'error'); return; }

  const selected = MODELS.filter(m => active.has(m.key));

  submitBtn.disabled = true;
  setStatus(`Firing at ${selected.length} models…`);
  // Clear previous results + winner classes
  for (const key of Object.keys(results)) delete results[key];
  selected.forEach(m => setLoading(m.key));

  let done = 0;

  const promises = selected.map(m =>
    fetch('/api/proxy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ provider: m.provider, model: m.id, prompt }),
    })
    .then(r => r.json())
    .then(data => {
      if (data.error) throw new Error(data.error);
      setDone(m.key, data.content, data.response_time_ms, data.tokens_in, data.tokens_out);
    })
    .catch(err => setError(m.key, err.message))
    .finally(() => {
      done++;
      setStatus(`${done}/${selected.length} complete${done < selected.length ? '…' : ''}`);
    })
  );

  await Promise.allSettled(promises);

  awardWinners();

  const anyError = selected.some(m => card(m.key)?.classList.contains('errored'));
  setStatus(
    anyError ? 'Finished — some models errored.' : 'All models responded.',
    anyError ? 'error' : 'ok'
  );
  submitBtn.disabled = false;
}

// ── Input bindings ────────────────────────────────────────────────────────────
promptInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); fire(); }
});
submitBtn.addEventListener('click', fire);
</script>
